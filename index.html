<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JB Assessoria Contábil</title>

<!-- SEO -->
<meta name="description" content="Contabilidade profissional em Araxá. Abertura de empresas, MEI, Simples Nacional e mais.">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0b0f1a; color:white; }

/* MENU */
#navbar { background:#0b0f1a; }

/* CHAT */
#chat-input {
  background:#1a1f2e;
  color:white;
}

#chat-input::placeholder {
  color:rgba(255,255,255,0.4);
}

/* BOTÃO CENTRAL */
#central-btn {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#2a9d8f;
  padding:14px 22px;
  border-radius:30px;
  font-weight:600;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  z-index:999;
}

/* PERFORMANCE */
img { loading:lazy; }
</style>
</head>

<body>

<!-- NAVBAR -->
<header id="navbar" class="fixed w-full top-0 z-50 p-4 flex justify-between items-center">
  <img src="https://raw.githubusercontent.com/SEU-USUARIO/SEU-REPO/main/logo.png" alt="Logo" class="h-10">
</header>

<!-- HERO -->
<section class="h-screen flex items-center justify-center text-center px-4">
  <div>
    <h1 class="text-4xl font-bold mb-4">Contabilidade inteligente para sua empresa</h1>
    <p class="opacity-70">Atendimento rápido, humano e eficiente</p>
  </div>
</section>

<!-- GOOGLE REVIEWS (SOMENTE AVALIAÇÕES) -->
<section class="py-20 text-center">
  <h2 class="text-2xl mb-6">Avaliações no Google</h2>
  <div id="reviews"></div>
</section>

<!-- CHAT COM IA REAL -->
<section class="p-6 max-w-xl mx-auto">
  <div id="chat-box" class="space-y-3 mb-4"></div>
  <input id="chat-input" type="text" placeholder="Digite sua dúvida..." class="w-full p-3 rounded-lg">
</section>

<!-- BOTÃO CENTRAL -->
<button id="central-btn" onclick="openWhatsApp()">Tire suas dúvidas</button>

<script>

/* PERFORMANCE SCROLL */
window.addEventListener('scroll', () => {
  const y = window.scrollY;
  document.getElementById('navbar').style.boxShadow = y > 20 ? '0 4px 20px rgba(0,0,0,0.3)' : 'none';
});

/* WHATSAPP */
function openWhatsApp() {
  window.open('https://wa.me/5534988374643', '_blank');
}

/* GOOGLE REVIEWS (SIMPLIFICADO) */
const API_KEY = 'SUA_CHAVE';
const PLACE_ID = 'SEU_PLACE_ID';

async function loadReviews() {
  try {
    const res = await fetch(`https://maps.googleapis.com/maps/api/place/details/json?place_id=${PLACE_ID}&fields=reviews&key=${API_KEY}`);
    const data = await res.json();
    const reviews = data.result.reviews.slice(0,3);

    const container = document.getElementById('reviews');
    reviews.forEach(r => {
      const div = document.createElement('div');
      div.className = 'mb-4 opacity-80';
      div.innerText = `"${r.text}" - ${r.author_name}`;
      container.appendChild(div);
    });
  } catch(e) {}
}

loadReviews();

/* CHAT IA (OPENAI) */
async function sendMessage(msg) {
  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':'Bearer SUA_API_OPENAI'
    },
    body:JSON.stringify({
      model:'gpt-4o-mini',
      messages:[{role:'user',content:msg}]
    })
  });

  const data = await res.json();
  return data.choices[0].message.content;
}

const input = document.getElementById('chat-input');
input.addEventListener('keydown', async (e) => {
  if (e.key === 'Enter') {
    const msg = input.value;
    input.value = '';

    const box = document.getElementById('chat-box');

    const user = document.createElement('div');
    user.textContent = msg;
    user.className = 'bg-blue-500 p-2 rounded';
    box.appendChild(user);

    const bot = document.createElement('div');
    bot.textContent = 'Digitando...';
    bot.className = 'bg-gray-700 p-2 rounded';
    box.appendChild(bot);

    const reply = await sendMessage(msg);
    bot.textContent = reply;
  }
});

</script>

</body>
</html>
